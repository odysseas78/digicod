# NetWatcher for LXD + WireGuard environments
# Run on the WireGuard/LXD administration node.

web:
  host: "0.0.0.0"
  port: 8080

scanner:
  interval_seconds: 60
  timeout_seconds: 0.6
  max_concurrency: 512
  only_open: true

  # Important safety default: scan only private/link-local IPv4 addresses.
  # Keep this true unless you intentionally want to scan public IPs you own.
  private_only: true

  # IPs or networks that must never be scanned. Use this for public IPs, gateways,
  # DNS servers, routers, or sensitive systems. Examples:
  # - "203.0.113.10"
  # - "203.0.113.0/24"
  # - "10.251.167.1"
  exclude_targets: []

  # Ports you care about. Keep this list controlled.
  ports:
    - 22
    - 53
    - 80
    - 443
    - 5432
    - 6379
    - 8000
    - 8080
    - 8443
    - 8200
    - 51820

  discovery:
    lxd: true
    wireguard: true
    linux_routes: true
    arp_neigh: true
    etc_hosts: true

  # Extra networks/hosts to scan. Examples:
  # - "10.0.0.0/24"
  # - "10.17.106.0/24"
  # - "10.251.167.110/32"
  manual_targets: []

wireguard:
  enabled: true
  interface: "wg0"
  config_path: "/etc/wireguard/wg0.conf"
  backup_dir: "/etc/wireguard/netwatcher-backups"

  # false = save config only. true = also run wg-quick down/up after changes.
  auto_apply: false

  # Command used when auto_apply=true.
  apply_command: "wg-quick down wg0 && wg-quick up wg0"
