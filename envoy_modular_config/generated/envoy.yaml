admin:
  access_log_path: /etc/envoy/dcfront/dcfront_access.log
  address:
    socket_address:
      protocol: TCP
      address: 0.0.0.0
      port_value: 9901
static_resources:
  listeners:
  - name: listener_http
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 80
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          use_remote_address: true
          xff_num_trusted_hops: 1
          generate_request_id: true
          preserve_external_request_id: true
          codec_type: AUTO
          route_config:
            name: http_redirects
            virtual_hosts:
            - name: digicod_eu_http_redirect
              domains:
              - digicod.eu
              routes:
              - match:
                  prefix: /
                redirect:
                  scheme_redirect: https
                  response_code: PERMANENT_REDIRECT
            - name: gunicorn_subdomains_digicod_eu_http_redirect
              domains:
              - api.digicod.eu
              - shop.digicod.eu
              - accounts.digicod.eu
              - orders.digicod.eu
              - products.digicod.eu
              routes:
              - match:
                  prefix: /
                redirect:
                  scheme_redirect: https
                  response_code: PERMANENT_REDIRECT
            - name: local_digicod_eu_http_redirect
              domains:
              - local.digicod.eu
              routes:
              - match:
                  prefix: /
                redirect:
                  scheme_redirect: https
                  response_code: PERMANENT_REDIRECT
              typed_per_filter_config:
                envoy.filters.http.rbac:
                  '@type': type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                  rbac:
                    rules:
                      action: ALLOW
                      policies:
                        local_network_only:
                          permissions:
                          - any: true
                          principals:
                          - direct_remote_ip:
                              address_prefix: 10.0.0.0
                              prefix_len: 24
                          - direct_remote_ip:
                              address_prefix: 127.0.0.1
                              prefix_len: 32
          http_filters:
          - name: envoy.filters.http.rbac
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
              rules:
                action: ALLOW
                policies:
                  allow_all_by_default:
                    permissions:
                    - any: true
                    principals:
                    - any: true
          - name: envoy.filters.http.router
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  - name: listener_https
    address:
      socket_address:
        protocol: TCP
        address: 0.0.0.0
        port_value: 443
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_https
          use_remote_address: true
          xff_num_trusted_hops: 1
          generate_request_id: true
          preserve_external_request_id: true
          codec_type: AUTO
          route_config:
            name: https_routes
            virtual_hosts:
            - name: digicod_eu
              domains:
              - digicod.eu
              routes:
              - match:
                  prefix: /
                route:
                  cluster: service_cluster
            - name: gunicorn_subdomains_digicod_eu
              domains:
              - api.digicod.eu
              - shop.digicod.eu
              - accounts.digicod.eu
              - orders.digicod.eu
              - products.digicod.eu
              routes:
              - match:
                  prefix: /
                route:
                  cluster: gunicorn_cluster
            - name: local_digicod_eu
              domains:
              - local.digicod.eu
              routes:
              - match:
                  prefix: /
                route:
                  cluster: gunicorn_cluster
              typed_per_filter_config:
                envoy.filters.http.rbac:
                  '@type': type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                  rbac:
                    rules:
                      action: ALLOW
                      policies:
                        local_network_only:
                          permissions:
                          - any: true
                          principals:
                          - direct_remote_ip:
                              address_prefix: 10.0.0.0
                              prefix_len: 24
                          - direct_remote_ip:
                              address_prefix: 127.0.0.1
                              prefix_len: 32
          http_filters:
          - name: envoy.filters.http.rbac
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
              rules:
                action: ALLOW
                policies:
                  allow_all_by_default:
                    permissions:
                    - any: true
                    principals:
                    - any: true
          - name: envoy.filters.http.router
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          http2_protocol_options:
            allow_connect: true
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          '@type': type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            tls_certificates:
            - certificate_chain:
                filename: /etc/letsencrypt/live/digicod.eu/fullchain.pem
              private_key:
                filename: /etc/letsencrypt/live/digicod.eu/privkey.pem
  clusters:
  - name: service_cluster
    connect_timeout: 0.25s
    type: STATIC
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: service_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                protocol: TCP
                address: 10.251.167.51
                port_value: 3000
  - name: gunicorn_cluster
    connect_timeout: 0.25s
    type: STATIC
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: gunicorn_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                protocol: TCP
                address: 10.251.167.114
                port_value: 8080
