name: gunicorn_subdomains_digicod_eu
order: 20
base_domain: digicod.eu
subdomains:
  - api
  - shop
  - accounts
  - orders
  - products
http_routes:
  - match:
      prefix: /
    redirect:
      scheme_redirect: https
      response_code: PERMANENT_REDIRECT
https_routes:
  - match:
      prefix: /
    route:
      cluster: gunicorn_cluster
