<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    html,
body {
  padding: 0;
  margin: 0;
  overflow: hidden;
}
.main {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 90vh;
  /* font-family: "Righteous", cursive; */
  position: relative;
  background-color: #fafafa;
}
.countdown {
  display: flex;
  justify-content: center;
  align-items: center;
  /* width: 100vw;
  height: 100vh; */
  /* font-family: "Righteous", cursive; */
  position: relative;
  background-color: #fafafa;
}
.countdown-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-evenly;
  background-image: linear-gradient(0deg, #000 0%, #444 100%);
  color: #fff;
  font-size: 26px;
  border-radius: 10px;
  margin: 0 4px;
  min-width: 75px;
  min-height: 85px;
  z-index: 2;
}
.countdown-item span:nth-child(1) {
  height: 33px;
}
.countdown-item span:nth-child(2) {
  font-size: 16px;
}
.pulse {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 0;
  height: 0;
  opacity: 1;
  background-color: #888;
  border-radius: 50%;
  z-index: 1;
  animation: pluseAnimation 1s ease infinite;
}
@keyframes pluseAnimation {
  0% {
    width: 0;
    height: 0;
    opacity: 1;
  }
  50% {
    opacity: 0;
  }
  100% {
    width: 500px;
    height: 500px;
    opacity: 0;
  }
}
  </style>

</head>
<body>
  <div class="main">
    <img src="https://digicod.eu/media/logo.svg" alt="DIGICOD" width="200">
    <div class="countdown">
      <div class="countdown-item">
        <span id="day">-</span>
        <span>Days</span>
      </div>
    
      <div class="countdown-item">
        <span id="hour">-</span>
        <span>Hours</span>
      </div>
    
      <div class="countdown-item">
        <span id="minute">-</span>
        <span>Minuts</span>
      </div>
    
      <div class="countdown-item">
        <span id="second">-</span>
        <span>Seconds</span>
      </div>
      
      <div class="pulse"></div>
    </div>
    <span>UPDATE...</span>
  </div>
  <div style="display: none" id="jsonData" data-json="{{jsondata}}"></div>
  

  <script>

function loadJson(selector) {
  return JSON.parse(document.querySelector(selector).getAttribute('data-json'));
}
var jsonData = loadJson('#jsonData');
// USE CHRISTMAS DAY so countdown is not a negative value for foreseeable future

var deadline = new Date(jsonData.date).getTime()

    let countDownEnd = false;

setInterval(() => {
  let targetTime = deadline;
  let now = new Date().getTime();
  let timeleft = targetTime - now;

  if (timeleft < 0) {
    countDownEnd = true;
  }

  // Calculating the days, hours, minutes and seconds left
  let day = Math.floor(timeleft / (1000 * 60 * 60 * 24));
  let hour = Math.floor((timeleft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let minute = Math.floor((timeleft % (1000 * 60 * 60)) / (1000 * 60));
  let second = Math.floor((timeleft % (1000 * 60)) / 1000);

  document.getElementById("day").innerText = day;
  document.getElementById("hour").innerText = hour;
  document.getElementById("minute").innerText = minute;
  document.getElementById("second").innerText = second;
}, 1000);

setInterval(() => {
  location.reload();
}, 60000)
  </script>
</body>
</html>
